name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          rsync -rlptz --delete \
            --exclude .git --exclude .github --exclude node_modules \
            --exclude '.env*' --exclude uploads --exclude '*.log' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:tiketq-bosbiller/"

      - name: Install, generate Prisma client, restart
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd ~/tiketq-bosbiller
            npm ci --ignore-scripts
            npx prisma generate
            pm2 restart backend --update-env
            sleep 5
            pm2 describe backend | grep -q "status.*online"
            curl -sf -o /dev/null http://localhost:3001/api/ || curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/ | grep -qE "^(2|3|4)"
          '

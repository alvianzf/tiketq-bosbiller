openapi: 3.0.0
info:
  title: TiketQ Bosbiller API
  description: API for flight searches, bookings, and user management.
  version: 1.0.0
servers:
  - url: /
    description: Local server
paths:
  # Flight Domain
  /api/flight/airlines:
    get:
      summary: Get all airlines
      tags:
        - Flight
      responses:
        "200":
          description: A list of airlines
  /api/flight/airports:
    get:
      summary: Get all airports
      tags:
        - Flight
      responses:
        "200":
          description: A list of airports
  /api/flight/search:
    post:
      summary: Search for flights
      tags:
        - Flight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Search results
  /api/flight/book:
    post:
      summary: Book a flight
      tags:
        - Flight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Booking result
  /api/flight/book-info/{id}:
    get:
      summary: Get booking information by ID
      tags:
        - Flight
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Booking information
  /api/flight/search-airport/{query}:
    get:
      summary: Search for an airport
      tags:
        - Flight
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of matching airports
  /api/flight/bookings:
    get:
      summary: Get all flight bookings (Protected)
      tags:
        - Flight
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of bookings
    post:
      summary: Create a flight booking record (Protected)
      tags:
        - Flight
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Booking created

  # Auth Domain
  /api/auth:
    post:
      summary: Login user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Login successful
  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: User registered
  /api/auth/admin-login:
    post:
      summary: Admin login
      tags:
        - Auth
      responses:
        "200":
          description: Admin login successful
  /api/auth/admin-register:
    post:
      summary: Admin registration (Protected)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Admin registered
  /api/auth/users:
    get:
      summary: Get all users (Protected)
      tags:
        - Auth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users

  # Payment Domain
  /api/payment:
    post:
      summary: Process payment
      tags:
        - Payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Payment processed
  /api/payment/midtrans:
    post:
      summary: Create Midtrans token
      tags:
        - Payment
      responses:
        "200":
          description: Token created

  # Ferry Domain
  /api/ferry:
    get:
      summary: Ferry API placeholder
      tags:
        - Ferry
      responses:
        "200":
          description: Welcome to Ferry API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

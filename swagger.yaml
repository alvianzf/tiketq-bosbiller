openapi: 3.0.0
info:
  title: TiketQ Bosbiller API
  description: API for flight searches, bookings, and user management.
  version: 1.0.0
servers:
  - url: /
    description: Local server
paths:
  # Flight Domain
  /api/flight/airlines:
    get:
      summary: Get all airlines
      tags: [Flight]
  /api/flight/airports:
    get:
      summary: Get all airports
      tags: [Flight]
  /api/flight/search:
    post:
      summary: Search for flights
      tags: [Flight]
  /api/flight/book:
    post:
      summary: Book a flight
      tags: [Flight]
  /api/flight/payment:
    post:
      summary: Process flight payment (amount derived server-side from the stored booking)
      tags: [Flight]

  # Payment Domain (DANA — the only payment gateway)
  /api/dana/create-order:
    post:
      summary: Create a DANA payment (payMethod one of DANA, BNI, BRI, MANDIRI, CIMB, PANIN)
      tags: [Payment]
  /api/dana-notify-callback:
    post:
      summary: DANA Finish Notify webhook (SNAP-signature verified)
      tags: [Payment]

  # Auth Domain
  /api/auth/:
    post:
      summary: Login user
      tags: [Auth]
  /api/auth/admin-login:
    post:
      summary: Admin login
      tags: [Auth]
  /api/auth/register:
    post:
      summary: Register user
      tags: [Auth]
  /api/auth/me:
    get:
      summary: Get current user profile (requires JWT)
      tags: [Auth]
  /api/auth/users:
    get:
      summary: List users (requires admin)
      tags: [Auth]

  # Ferry Domain
  /api/ferry/master/sectors:
    get:
      summary: List ferry sectors
      tags: [Ferry]
  /api/ferry/master/routes:
    get:
      summary: List ferry routes
      tags: [Ferry]
  /api/ferry/trips/search:
    get:
      summary: Search ferry trips
      tags: [Ferry]
  /api/ferry/booking:
    post:
      summary: Initialize ferry booking
      tags: [Ferry]
  /api/ferry/booking/{id}/details:
    post:
      summary: Add passenger details to booking
      tags: [Ferry]
  /api/ferry/booking/submit:
    post:
      summary: Submit ferry booking
      tags: [Ferry]
  /api/ferry/order/{id}/print:
    get:
      summary: Get order printout
      tags: [Ferry]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

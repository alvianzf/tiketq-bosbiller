openapi: 3.0.0
info:
  title: TiketQ Bosbiller API
  description: API for flight searches, bookings, and user management.
  version: 1.0.0
servers:
  - url: /
    description: Local server
paths:
  # Flight Domain
  /api/flight/airlines:
    get:
      summary: Get all airlines
      tags: [Flight]
  /api/flight/airports:
    get:
      summary: Get all airports
      tags: [Flight]
  /api/flight/search:
    post:
      summary: Search for flights
      tags: [Flight]
  /api/flight/book:
    post:
      summary: Book a flight
      tags: [Flight]
  /api/flight/payment:
    post:
      summary: Process flight payment
      tags: [Flight]
  /api/flight/payment/midtrans:
    post:
      summary: Create Midtrans token for flight
      tags: [Flight]

  # Auth Domain
  /api/auth/login:
    post:
      summary: Login user
      tags: [Auth]
  /api/auth/register:
    post:
      summary: Register user
      tags: [Auth]
  /api/auth/users:
    get:
      summary: List users
      tags: [Auth]

  # Ferry Domain
  /api/ferry/master/sectors:
    get:
      summary: List ferry sectors
      tags: [Ferry]
  /api/ferry/trips/search:
    get:
      summary: Search ferry trips
      tags: [Ferry]

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
